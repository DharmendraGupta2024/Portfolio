<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iacGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E97" />
      <stop offset="100%" stop-color="#E10066" />
    </linearGradient>
  </defs>
  <!-- Squircle background -->
  <rect width="100" height="100" rx="26" fill="url(#iacGrad)" />
  <!-- Icon: Code brackets enclosing a server stack -->
  <g fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left angle bracket < -->
    <path d="M 34 34 L 22 50 L 34 66" />
    <!-- Right angle bracket > -->
    <path d="M 66 34 L 78 50 L 66 66" />
    <!-- Server Stack in the middle -->
    <rect x="42" y="34" width="16" height="32" rx="2" />
    <!-- Server Bays dividers -->
    <path d="M 42 44.5 h 16" />
    <path d="M 42 55.5 h 16" />
    <!-- Small LEDs on servers -->
    <circle cx="47" cy="39" r="1.2" fill="white" stroke="none" />
    <circle cx="47" cy="50" r="1.2" fill="white" stroke="none" />
    <circle cx="47" cy="61" r="1.2" fill="white" stroke="none" />
  </g>
</svg>
