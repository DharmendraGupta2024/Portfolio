<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="devopsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E97" />
      <stop offset="100%" stop-color="#E10066" />
    </linearGradient>
  </defs>
  <!-- Squircle background -->
  <rect width="100" height="100" rx="26" fill="url(#devopsGrad)" />
  <!-- Icon: Infinity loop representing Continuous Integration & Continuous Deployment -->
  <g fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Infinity loop -->
    <path d="M 50 50 C 38 33, 23 33, 23 50 C 23 67, 38 67, 50 50 C 62 33, 77 33, 77 50 C 77 67, 62 67, 50 50 Z" />
    <!-- Loop nodes (Build, Test, Deploy pipeline stages) -->
    <circle cx="23" cy="50" r="3.5" fill="white" stroke="none" />
    <circle cx="50" cy="50" r="3.5" fill="white" stroke="none" />
    <circle cx="77" cy="50" r="3.5" fill="white" stroke="none" />
  </g>
</svg>
